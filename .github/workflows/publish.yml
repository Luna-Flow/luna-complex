name: publish-package
run-name: publish to mooncakes
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to publish. Must exactly match moon.mod."
        required: true
        type: string
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH
      - name: moon version
        run: |
          moon version --all
          moonrun --version
      - name: verify release version
        run: |
          PKG_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' moon.mod)
          echo "moon.mod version: $PKG_VERSION"
          echo "workflow input version: ${{ inputs.release_version }}"
          test -n "$PKG_VERSION"
          test "$PKG_VERSION" = "${{ inputs.release_version }}"
      - name: moon update
        run: |
          moon update
      - name: moon check
        run: |
          moon install
          moon check --target all
      - name: publish
        run: |
          trap 'rm -f ~/.moon/credentials.json' EXIT
          echo "publishing version ${{ inputs.release_version }}"
          printf '%s' "$SECRET" > ~/.moon/credentials.json
          moon publish
        env:
          SECRET: ${{ secrets.LUNA_MOONCAKE }}
